<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMR Calculator | FitMetrics Tools</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input, select, button {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: green;
      color: white;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>BMR Calculator</h1>

<input id="weight" type="number" placeholder="Weight (kg)">
<input id="height" type="number" placeholder="Height (cm)">


<button onclick="calculateBMR()">Calculate BMR</button>

<div id="result">Enter your details</div>

<p>
  👉 Based on your result, try:
  <a href="tdee-calculator.html">TDEE Calculator</a>
</p>
  
<script>
function calculateBMR() {
  const w = parseFloat(document.getElementById("weight").value);
  const h = parseFloat(document.getElementById("height").value);
  const a = parseFloat(document.getElementById("age").value);
  const gender = document.getElementById("gender").value;

  if (!w || !h || !a) {
    document.getElementById("result").innerHTML = "Please enter all fields.";
    return;
  }

  let bmr;
  if (gender === "male") {
    bmr = 10 * w + 6.25 * h - 5 * a + 5;
  } else {
    bmr = 10 * w + 6.25 * h - 5 * a - 161;
  }

  document.getElementById("result").innerHTML =
    "Your BMR is " + Math.round(bmr) + " kcal/day";
}
</script>

</body>

</header>
</html>
