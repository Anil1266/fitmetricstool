<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMI Calculator | FitMetrics Tools</title>

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<header class="site-header">
<div class="nav-container">

<h2 class="logo">FitMetrics Tools</h2>

<nav class="nav-menu">
<a href="/">Home</a>
<a href="/calorie-calculator.html">Calorie Calculator</a>
<a href="/bmi-calculator.html">BMI Calculator</a>
<a href="/bmr-calculator.html">BMR Calculator</a>
<a href="/tdee-calculator.html">TDEE Calculator</a>
<a href="/water-intake-calculator.html">Water Intake</a>
<a href="/ideal-weight-calculator.html">Ideal Weight</a>
</nav>

</div>
</header>


<div class="container">

<div class="calculator-card">

<h1>BMI Calculator</h1>

<input type="number" id="weight" placeholder="Weight (kg)">
<input type="number" id="height" placeholder="Height (cm)">

<button onclick="calculateBMI()">Calculate BMI</button>

<div id="result"></div>

</div>

</div>


<script>

function calculateBMI(){

let weight=document.getElementById("weight").value;
let height=document.getElementById("height").value;

height=height/100;

let bmi=weight/(height*height);

bmi=bmi.toFixed(1);

document.getElementById("result").innerHTML="Your BMI: "+bmi;

}

</script>

</body>
</html>
