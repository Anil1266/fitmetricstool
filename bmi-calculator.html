<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMI Calculator | FitMetrics Tools</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.site-header{
background:#000;
padding:15px 0;
}

.nav-container{
max-width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
}

.nav-menu a{
color:white;
text-decoration:none;
margin-left:15px;
font-size:14px;
}

.nav-menu a:hover{
color:#4db5ff;
}

.container{
max-width:800px;
margin:auto;
padding:40px 20px;
}

.calculator-card{
background:#1a1a1a;
padding:30px;
border-radius:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border-radius:6px;
border:none;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#1e88e5;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#result{
margin-top:15px;
font-size:18px;
}

</style>
</head>

<body>

<header class="site-header">
<div class="nav-container">

<h2>FitMetrics Tools</h2>

<nav class="nav-menu">
<a href="/">Home</a>
<a href="/calorie-calculator.html">Calorie</a>
<a href="/bmi-calculator.html">BMI</a>
<a href="/bmr-calculator.html">BMR</a>
<a href="/tdee-calculator.html">TDEE</a>
<a href="/water-intake-calculator.html">Water</a>
<a href="/ideal-weight-calculator.html">Ideal</a>
</nav>

</div>
</header>

<div class="container">

<div class="calculator-card">

<h1>BMI Calculator</h1>

<input id="weight" type="number" placeholder="Weight (kg)">
<input id="height" type="number" placeholder="Height (cm)">

<button onclick="calcBMI()">Calculate</button>

<div id="result"></div>

</div>

</div>

<script>

function calcBMI(){

let w=document.getElementById("weight").value;
let h=document.getElementById("height").value;

h=h/100;

let bmi=w/(h*h);

bmi=bmi.toFixed(1);

document.getElementById("result").innerHTML="Your BMI: "+bmi;

}

</script>

</body>
</html>
