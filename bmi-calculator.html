<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMI Calculator | FitMetrics Tools</title>

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<header class="site-header">
<div class="nav-container">

<h2>FitMetrics Tools</h2>

<nav class="nav-menu">
<a href="/">Home</a>
<a href="/calorie-calculator.html">Calorie</a>
<a href="/bmi-calculator.html">BMI</a>
<a href="/bmr-calculator.html">BMR</a>
<a href="/tdee-calculator.html">TDEE</a>
<a href="/water-intake-calculator.html">Water</a>
<a href="/ideal-weight-calculator.html">Ideal</a>
</nav>

</div>
</header>

<div class="container">

<div class="calculator-card">

<h1>BMI Calculator</h1>

<input id="weight" type="number" placeholder="Weight (kg)">
<input id="height" type="number" placeholder="Height (cm)">

<button onclick="calcBMI()">Calculate</button>

<div id="result"></div>

</div>

</div>

<script>

function calcBMI(){

let w=document.getElementById("weight").value;
let h=document.getElementById("height").value;

h=h/100;

let bmi=w/(h*h);

bmi=bmi.toFixed(1);

document.getElementById("result").innerHTML="Your BMI: "+bmi;

}

</script>

</body>
</html>
