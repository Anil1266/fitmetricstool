<html lang="en">

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<header class="site-header">
<div class="nav-container">

<h2 class="logo">FitMetrics Tools</h2>

<nav class="nav-menu">
<a href="/">Home</a>
<a href="/calorie-calculator.html">Calorie</a>

<div class="container">

<div class="calculator-card">

<h1>TDEE Calculator</h1>

<p>Estimate your total daily energy expenditure.</p>

<input id="age" type="number" placeholder="Age">
<input id="weight" type="number" placeholder="Weight (kg)">
<input id="height" type="number" placeholder="Height (cm)">

<select id="activity">
<option value="1.2">Sedentary</option>
<option value="1.375">Light Exercise</option>
<option value="1.55">Moderate Exercise</option>
<option value="1.725">Heavy Exercise</option>
</select>

<button onclick="calculateTDEE()">Calculate TDEE</button>

<div id="result"></div>

</div>

</div>

<script src="/scripts.js"></script>

</body>
