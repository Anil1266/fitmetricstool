<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TDEE Calculator | FitMetrics Tools</title>

<meta name="description" content="Calculate your Total Daily Energy Expenditure (TDEE) to understand how many calories you burn each day.">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#0f0f0f;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:center;
gap:30px;
background:#111;
padding:16px;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:700px;
margin:auto;
padding:30px;
}

/* CARD */

.card{
background:#1a1a1a;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:none;
background:#2c2c2c;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#3fa9f5,#00c6ff);
color:white;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
text-align:center;
}

footer{
text-align:center;
padding:30px;
color:#aaa;
}

</style>

</head>

<body>

<nav class="navbar">

<a href="/">Home</a>
<a href="/calorie-calculator.html">Calorie Calculator</a>

</nav>

<div class="container">

<div class="card">

<h1>TDEE Calculator</h1>

<input type="number" id="age" placeholder="Enter Age">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<input type="number" id="weight" placeholder="Weight (kg)">
<input type="number" id="height" placeholder="Height (cm)">

<select id="activity">
<option value="1.2">Sedentary (little or no exercise)</option>
<option value="1.375">Lightly active</option>
<option value="1.55">Moderately active</option>
<option value="1.725">Very active</option>
<option value="1.9">Super active</option>
</select>

<button onclick="calculateTDEE()">Calculate TDEE</button>

<div class="result" id="result"></div>

</div>

</div>

<footer>

<p>© 2026 FitMetrics Tools</p>

<p>
<a href="/privacy-policy.html">Privacy Policy</a> |
<a href="/terms.html">Terms</a> |
<a href="/about.html">About</a> |
<a href="/contact.html">Contact</a>
</p>

</footer>
<script>

function calculateTDEE(){

let age=document.getElementById("age").value;
let gender=document.getElementById("gender").value;
let weight=document.getElementById("weight").value;
let height=document.getElementById("height").value;
let activity=document.getElementById("activity").value;

let bmr;

if(gender==="male"){
bmr=10*weight+6.25*height-5*age+5;
}else{
bmr=10*weight+6.25*height-5*age-161;
}

let tdee=bmr*activity;

document.getElementById("result").innerHTML=
"Your estimated daily calories: <b>"+Math.round(tdee)+" kcal</b>";

}

</script>

</body>

</html>
