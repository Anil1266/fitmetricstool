<!DOCTYPE html>
<html>
<head>
<title>TDEE Calculator</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;}
.container{max-width:800px;margin:auto;padding:40px 20px;}
.calculator-card{background:#1a1a1a;padding:30px;border-radius:10px;}
input,select{width:100%;padding:12px;margin-top:10px;margin-bottom:15px;border:none;border-radius:6px;background:#2a2a2a;color:white;}
button{width:100%;padding:12px;border:none;border-radius:6px;background:#1e88e5;color:white;}
</style>

</head>

<body>

<div class="container">
<div class="calculator-card">

<h1>TDEE Calculator</h1>

<input type="number" placeholder="Age">
<select>
<option>Male</option>
<option>Female</option>
</select>

<input type="number" placeholder="Weight (kg)">
<input type="number" placeholder="Height (cm)">

<select>
<option>Sedentary</option>
<option>Light Exercise</option>
<option>Moderate Exercise</option>
<option>Heavy Exercise</option>
</select>

<button>Calculate TDEE</button>

</div>
</div>

</body>
</html>
