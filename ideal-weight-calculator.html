<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ideal Weight Calculator | FitMetrics Tools</title>

<meta name="description" content="Calculate your ideal body weight based on your height and gender.">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#0f0f0f;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:center;
gap:30px;
background:#111;
padding:16px;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:700px;
margin:auto;
padding:30px;
}

/* CARD */

.card{
background:#1a1a1a;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:none;
background:#2c2c2c;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#3fa9f5,#00c6ff);
color:white;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
text-align:center;
}

/* RELATED TOOLS */

.related-tools{
margin-top:40px;
}

.tools-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.tool-card{
background:#1a1a1a;
padding:18px;
border-radius:10px;
text-align:center;
text-decoration:none;
color:white;
}

.tool-card:hover{
background:#1e88e5;
}

.tool-icon{
font-size:28px;
display:block;
margin-bottom:8px;
}

footer{
text-align:center;
padding:30px;
color:#aaa;
}

@media (max-width:768px){

.tools-grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<nav class="navbar">

<a href="/">Home</a>
<a href="/calorie-calculator.html">Calorie Calculator</a>

</nav>

<div class="container">

<div class="card">

<h1>Ideal Weight Calculator</h1>

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<input type="number" id="height" placeholder="Height (cm)">

<button onclick="calculateIdealWeight()">Calculate Ideal Weight</button>

<div class="result" id="result"></div>

</div>

<!-- RELATED CALCULATORS -->

<section class="related-tools">

<h2>Related Health Calculators</h2>

<div class="tools-grid">

<a href="/bmi-calculator.html" class="tool-card">
<span class="tool-icon">⚖️</span>
<h3>BMI Calculator</h3>
</a>

<a href="/calorie-calculator.html" class="tool-card">
<span class="tool-icon">🔥</span>
<h3>Calorie Calculator</h3>
</a>

<a href="/bmr-calculator.html" class="tool-card">
<span class="tool-icon">💪</span>
<h3>BMR Calculator</h3>
</a>

<a href="/tdee-calculator.html" class="tool-card">
<span class="tool-icon">📊</span>
<h3>TDEE Calculator</h3>
</a>

<a href="/water-intake-calculator.html" class="tool-card">
<span class="tool-icon">💧</span>
<h3>Water Intake</h3>
</a>

</div>

</section>

</div>

<footer>

<p>© 2026 FitMetrics Tools</p>

</footer>

<script>

function calculateIdealWeight(){

let height=document.getElementById("height").value;
let gender=document.getElementById("gender").value;

let idealWeight;

if(gender==="male"){
idealWeight=50+0.9*(height-152);
}else{
idealWeight=45.5+0.9*(height-152);
}

document.getElementById("result").innerHTML=
"Your ideal body weight is about <b>"+idealWeight.toFixed(1)+" kg</b>";

}

</script>

</body>

</html>
