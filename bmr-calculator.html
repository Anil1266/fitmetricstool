<body>

<nav class="navbar">

<a href="/">Home</a>
<a href="/calorie-calculator.html">Calorie Calculator</a>

</nav>

<header class="site-header">

<h1>FitMetrics Tools</h1>

<p>Free Health & Fitness Calculators</p>

</header>

<div class="container">

<div class="card">

<h1>BMR Calculator</h1>

<input type="number" id="age" placeholder="Age">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<input type="number" id="weight" placeholder="Weight (kg)">
<input type="number" id="height" placeholder="Height (cm)">

<button onclick="calculateBMR()">Calculate BMR</button>

<div class="result" id="result"></div>

</div>

<!-- RELATED CALCULATORS -->

<h2>Related Health Calculators</h2>

<script>

function calculateBMR(){

let age=document.getElementById("age").value;
let gender=document.getElementById("gender").value;
let weight=document.getElementById("weight").value;
let height=document.getElementById("height").value;

let bmr;

if(gender==="male"){
bmr=10*weight+6.25*height-5*age+5;
}else{
bmr=10*weight+6.25*height-5*age-161;
}

document.getElementById("result").innerHTML=
"Your BMR: <b>"+Math.round(bmr)+" calories/day</b>";

}

</script>
